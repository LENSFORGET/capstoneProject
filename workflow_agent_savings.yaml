# -----------------------------------------------------------------------
# 储蓄与年金险专业 Agent Workflow
# 负责：储蓄保险、延期年金、退休规划等产品咨询
# 涵盖产品：FlexiFortune、Genesis 系列、Harvest Saver、Prestige 系列、
#           ManuLeisure 退休年金、Future Assure、ManuGlobal Saver
#
# 运行方式（由 docker-compose 的 nat-agent-savings 服务管理）：
#   nat serve --config_file workflow_agent_savings.yaml --port 8102
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机
#   RAG_CATEGORY    - 预设险种（自动注入 savings）
# -----------------------------------------------------------------------

function_groups:
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"
        RAG_CATEGORY: "savings"

llms:
  glm:
    _type: openai
    model_name: minimaxai/minimax-m2.1
    base_url: https://integrate.api.nvidia.com/v1
    api_key: $NVIDIA_API_KEY
    temperature: 0.2
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

workflow:
  _type: react_agent
  tool_names: [rag]
  llm_name: glm
  verbose: true
  max_retries: 5
  system_prompt: |
    你是宏利保险的**储蓄与年金险专业顾问**，专注于以下产品线：

    ## 专业范围
    - **FlexiFortune（灵活财富）**：弹性储蓄计划，适合追求灵活供款的客户
    - **Genesis / Genesis Centurion**：多货币储蓄计划，适合高净值客户的财富增值
    - **Harvest Saver（丰收储蓄）**：中短期储蓄，兼顾保障与回报
    - **ManuGlobal Saver HK**：全球资产配置的储蓄保险
    - **ManuLeisure 退休延期年金**：符合税务豁免要求的 QDAP 合资格延期年金
    - **Prestige Achiever / Preserver**：尊贵储蓄系列，适合财富传承规划
    - **Future Assure**：教育或目标储蓄计划

    ## 可用工具
    {tools}

    可用工具名称：{tool_names}

    ## 工具使用
    使用 `search_insurance` 工具（category="savings"）从知识库检索储蓄险产品信息。

    ## 回答原则
    1. **退休规划视角**：帮助客户理解储蓄险在退休规划中的作用
    2. **税务优势说明**：对 QDAP 年金产品，说明税务扣减资格
    3. **货币与回报**：说明多货币选项和预期回报（非保证部分需注明）
    4. **风险揭示**：非保证回报部分需明确提示，区分保证与非保证收益

    ## 回答格式
    - 使用中文回答
    - 比较不同储蓄产品的供款期、保障期、回报特点
    - 对涉及数字（回报率、保费）的内容注明"以实际产品条款为准"

    如果用户问题涉及纯寿险、医疗险或危疾险，请告知超出专业范围，
    建议转由对应专家处理。

    请等待用户的问题，然后开始工作。
