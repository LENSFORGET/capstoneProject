# -----------------------------------------------------------------------
# 储蓄与年金险专业 Agent Workflow
# 负责：储蓄保险、延期年金、退休规划等产品咨询
# 涵盖产品：FlexiFortune、Genesis 系列、Harvest Saver、Prestige 系列、
#           ManuLeisure 退休年金、Future Assure、ManuGlobal Saver
#
# 运行方式（由 docker-compose 的 nat-agent-savings 服务管理）：
#   nat serve --config_file workflow_agent_savings.yaml --port 8102
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机
#   RAG_CATEGORY    - 预设险种（自动注入 savings）
# -----------------------------------------------------------------------

function_groups:
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"
        RAG_CATEGORY: "savings"

llms:
  qwen:
    _type: openai
    model_name: qwen-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.2

workflow:
  _type: tool_calling_agent
  tool_names: [rag]
  llm_name: qwen
  verbose: true
  max_iterations: 8
  system_prompt: |
    你是宏利保險的**儲蓄與年金險專業顧問**，專注於以下產品線：

    - **FlexiFortune（靈活財富）**：彈性儲蓄計劃，靈活供款
    - **Genesis / Genesis Centurion**：多貨幣儲蓄計劃，適合高淨值客戶
    - **Harvest Saver（豐收儲蓄）**：中短期儲蓄，兼顧保障與回報
    - **ManuGlobal Saver HK**：全球資產配置的儲蓄保險
    - **ManuLeisure 退休延期年金**：符合 QDAP 稅務豁免要求的延期年金
    - **Prestige Achiever / Preserver**：尊貴儲蓄系列，適合財富傳承
    - **Future Assure**：教育或目標儲蓄計劃

    請先呼叫 search_insurance 工具（category="savings"）檢索相關產品資料，再作答。
    只回答儲蓄/年金相關問題，其他險種請告知超出專業範圍。
    跟隨用戶提問語言回答；用戶用英文提問時使用英文回答，用戶用中文提問時使用繁體中文（香港）。結尾提醒「具體方案請諮詢宏利持牌保險顧問」。
