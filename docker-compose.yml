version: "3.8"

# -----------------------------------------------------------------------
# NAT RAG 小红书保险系统 - Docker Compose
# 服务：etcd + minio + milvus-standalone + app
# -----------------------------------------------------------------------

services:

  # -----------------------------------------------------------------------
  # 1. etcd - Milvus 元数据存储
  # -----------------------------------------------------------------------
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 2. minio - Milvus 对象存储
  # -----------------------------------------------------------------------
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 3. milvus - 向量数据库 (standalone 模式)
  # -----------------------------------------------------------------------
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      # 9091 仅供容器内健康检查使用，不对外暴露（避免 Windows 端口权限问题）
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 4. postgres - 小红书爬取数据结构化存储
  # -----------------------------------------------------------------------
  postgres:
    container_name: xhs-postgres
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: xhs_data
      POSTGRES_USER: xhs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhs_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 容器启动时自动执行初始化 SQL
      - ./xhs_db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs_user -d xhs_data"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 5. app - NAT 应用容器（爬虫 + RAG + 问答）
  # -----------------------------------------------------------------------
  app:
    container_name: nat-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # NVIDIA API Key（GLM 5 + NVIDIA NIM embedding 共用）
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      # 小红书 Cookie（手动登录后粘贴，用于爬虫）
      - XHS_COOKIES=${XHS_COOKIES:-}
      # Milvus 连接配置
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      # PostgreSQL 连接配置（小红书爬取数据存储）
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xhs_data
      - POSTGRES_USER=xhs_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xhs_secure_pass}
    volumes:
      # 持久化爬取的 JSON 数据、MinerU 输出和模型缓存
      - app_data:/app/data
      - app_cache:/root/.cache
      # 将脚本挂载入容器，让本地修改瞬间生效，无需 rebuild
      - ./agent_browser_mcp.py:/app/agent_browser_mcp.py:ro
      - ./xhs_db_mcp.py:/app/xhs_db_mcp.py:ro
      - ./workflow_scraper.yaml:/app/workflow_scraper.yaml:ro
      - ./workflow_rag.yaml:/app/workflow_rag.yaml:ro
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      # 多 Agent 系统 workflow 文件
      - ./workflow_orchestrator.yaml:/app/workflow_orchestrator.yaml:ro
      - ./workflow_agent_life.yaml:/app/workflow_agent_life.yaml:ro
      - ./workflow_agent_savings.yaml:/app/workflow_agent_savings.yaml:ro
      - ./workflow_agent_medical.yaml:/app/workflow_agent_medical.yaml:ro
      - ./workflow_agent_critical.yaml:/app/workflow_agent_critical.yaml:ro
      # PDF 知识库目录（所有宏利产品手册）
      - ./PDF:/app/PDF:ro
      # 批量入库脚本
      - ./ingest_all.sh:/app/ingest_all.sh:ro
    depends_on:
      milvus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["/bin/bash"]
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 6. ui - Gradio Web UI (旧界面，保留备用)
  # 访问地址：http://localhost:8080
  # -----------------------------------------------------------------------
  ui:
    container_name: nat-gradio-ui
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xhs_data
      - POSTGRES_USER=xhs_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xhs_secure_pass}
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./ui.py:/app/ui.py:ro
      - ./rag_ingest.py:/app/rag_ingest.py:ro
    ports:
      - "8080:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      milvus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "ui.py"]
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 6. api - FastAPI 后端（保险问答 / 知识库管理 / 小红书数据）
  # 访问地址：http://localhost:8000
  # -----------------------------------------------------------------------
  api:
    container_name: nat-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xhs_data
      - POSTGRES_USER=xhs_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xhs_secure_pass}
      # 强制 watchfiles 使用轮询模式，避免 Windows Docker 挂载 I/O 错误
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./api.py:/app/api.py:ro
      - ./rag_ingest.py:/app/rag_ingest.py:ro
      - ./agent_browser_mcp.py:/app/agent_browser_mcp.py:ro
      - ./xhs_db_mcp.py:/app/xhs_db_mcp.py:ro
      - ./workflow_scraper.yaml:/app/workflow_scraper.yaml:ro
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      milvus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "65"]
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 多 Agent 保险 RAG 系统 - 专业保险 Agent 服务组
  # -----------------------------------------------------------------------

  # 寿险专业 Agent（ManuTerm / Universal Life / La Vie 2 / ManuCentury）
  # 访问地址：http://localhost:8101
  nat-agent-life:
    container_name: nat-agent-life
    image: capstoneproject-app
    env_file:
      - .env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - RAG_CATEGORY=life
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      - ./workflow_agent_life.yaml:/app/workflow_agent_life.yaml:ro
      - ./PDF:/app/PDF:ro
    ports:
      - "8101:8101"
    depends_on:
      milvus:
        condition: service_healthy
    command: ["nat", "serve", "--config_file", "workflow_agent_life.yaml", "--port", "8101", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - milvus-net

  # 储蓄与年金险专业 Agent（FlexiFortune / Genesis / Prestige / ManuLeisure 等）
  # 访问地址：http://localhost:8102
  nat-agent-savings:
    container_name: nat-agent-savings
    image: capstoneproject-app
    env_file:
      - .env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - RAG_CATEGORY=savings
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      - ./workflow_agent_savings.yaml:/app/workflow_agent_savings.yaml:ro
      - ./PDF:/app/PDF:ro
    ports:
      - "8102:8102"
    depends_on:
      milvus:
        condition: service_healthy
    command: ["nat", "serve", "--config_file", "workflow_agent_savings.yaml", "--port", "8102", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - milvus-net

  # 医疗险与 VHIS 专业 Agent（VHIS 灵活/标准/Supreme 等）
  # 访问地址：http://localhost:8103
  nat-agent-medical:
    container_name: nat-agent-medical
    image: capstoneproject-app
    env_file:
      - .env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - RAG_CATEGORY=medical
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      - ./workflow_agent_medical.yaml:/app/workflow_agent_medical.yaml:ro
      - ./PDF:/app/PDF:ro
    ports:
      - "8103:8103"
    depends_on:
      milvus:
        condition: service_healthy
    command: ["nat", "serve", "--config_file", "workflow_agent_medical.yaml", "--port", "8103", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - milvus-net

  # 危疾与综合保障专业 Agent（ManuPremier Protector / Whole-in-One Prime 等）
  # 访问地址：http://localhost:8104
  nat-agent-critical:
    container_name: nat-agent-critical
    image: capstoneproject-app
    env_file:
      - .env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - RAG_CATEGORY=critical
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      - ./workflow_agent_critical.yaml:/app/workflow_agent_critical.yaml:ro
      - ./PDF:/app/PDF:ro
    ports:
      - "8104:8104"
    depends_on:
      milvus:
        condition: service_healthy
    command: ["nat", "serve", "--config_file", "workflow_agent_critical.yaml", "--port", "8104", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - milvus-net

  # 主调度 Orchestrator Agent（意图识别 + A2A 路由到专业 Agent）
  # 访问地址：http://localhost:8100
  nat-orchestrator:
    container_name: nat-orchestrator
    image: capstoneproject-app
    env_file:
      - .env
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    volumes:
      - app_data:/app/data
      - app_cache:/root/.cache
      - ./workflow_orchestrator.yaml:/app/workflow_orchestrator.yaml:ro
      - ./rag_mcp.py:/app/rag_mcp.py:ro
      - ./agent_router_mcp.py:/app/agent_router_mcp.py:ro
    ports:
      - "8100:8100"
    depends_on:
      milvus:
        condition: service_healthy
      nat-agent-life:
        condition: service_started
      nat-agent-savings:
        condition: service_started
      nat-agent-medical:
        condition: service_started
      nat-agent-critical:
        condition: service_started
    command: ["nat", "serve", "--config_file", "workflow_orchestrator.yaml", "--port", "8100", "--host", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # NeMo Agent Toolkit UI（官方前端，替代旧 frontend 服务）
  # 访问地址：http://localhost:14000
  # 后端：nat-orchestrator:8100（多 Agent RAG 系统）
  # -----------------------------------------------------------------------
  nat-ui:
    container_name: nat-ui
    build:
      context: ./nat-ui
      dockerfile: Dockerfile
    env_file:
      - ./nat-ui/.env
    ports:
      - "14000:3000"
    depends_on:
      - nat-orchestrator
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 9. nat-email-agent - 宏利保险 AI 邮件自动回复服务
  # 功能：轮询 Gmail 收件箱 → 调用 RAG Orchestrator → 自动回复客户邮件
  # 前提：需在宿主机先运行 gws auth login 并导出 gws_credentials.json
  #       详见 README 中 "Gmail 邮件自动回复" 章节
  # -----------------------------------------------------------------------
  nat-email-agent:
    container_name: nat-email-agent
    build:
      context: .
      dockerfile: Dockerfile.email
    environment:
      - GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE=/app/gws_credentials.json
      - ORCHESTRATOR_URL=http://nat-orchestrator:8100
      - POLL_INTERVAL_SECONDS=30
    volumes:
      - ./gws_credentials.json:/app/gws_credentials.json:ro
      - ./email_agent.py:/app/email_agent.py:ro
    depends_on:
      - nat-orchestrator
    restart: unless-stopped
    networks:
      - milvus-net

  # -----------------------------------------------------------------------
  # 8. xhs-login - 小红书手动登录助手（按需启动，不随 up 自动启动）
  # 功能：启动 noVNC Web 图形界面，用户通过浏览器操作 Chromium 登录小红书
  #       登录后会话保存至 app_data 卷的 /app/data/xhs_state.json
  # 用法：
  #   docker-compose --profile login up xhs-login --build
  #   打开 http://localhost:6080 完成登录，按终端 Enter 保存会话
  # -----------------------------------------------------------------------
  xhs-login:
    container_name: xhs-login
    build:
      context: .
      dockerfile: Dockerfile.login
    environment:
      - DISPLAY=:99
    volumes:
      - app_data:/app/data
      - ./xhs_login_helper.py:/app/xhs_login_helper.py:ro
    ports:
      - "6080:6080"
    stdin_open: true
    tty: true
    networks:
      - milvus-net
    profiles:
      - login

  # -----------------------------------------------------------------------
  # 7. test - 测试运行容器（按需使用，不随 up 自动启动）
  # 用法：
  #   docker-compose run --rm test                   # 运行单元+集成测试
  #   docker-compose run --rm test pytest test_unit.py -v
  #   docker-compose run --rm test pytest test_integration.py -v
  #   docker-compose run --rm test pytest test_e2e.py -v  (需要 NVIDIA_API_KEY)
  # -----------------------------------------------------------------------
  test:
    container_name: nat-test
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-nvapi-test-placeholder}
      - XHS_COOKIES=${XHS_COOKIES:-}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=xhs_data
      - POSTGRES_USER=xhs_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xhs_secure_pass}
    volumes:
      - app_data:/app/data
      # 挂载测试文件（开发调试时热更新）
      - ./test_unit.py:/app/test_unit.py:ro
      - ./test_integration.py:/app/test_integration.py:ro
      - ./test_e2e.py:/app/test_e2e.py:ro
      - ./pytest.ini:/app/pytest.ini:ro
    depends_on:
      milvus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    working_dir: /app
    # 默认运行单元 + 集成测试（不调用 NVIDIA API）
    command: ["pytest", "-v", "--tb=short", "test_unit.py", "test_integration.py"]
    networks:
      - milvus-net
    profiles:
      - test

# -----------------------------------------------------------------------
# 网络
# -----------------------------------------------------------------------
networks:
  milvus-net:
    driver: bridge

# -----------------------------------------------------------------------
# 数据卷（持久化）
# -----------------------------------------------------------------------
volumes:
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local
  app_data:
    driver: local
  postgres_data:
    driver: local
  app_cache:
    driver: local
