# -----------------------------------------------------------------------
# 医疗险与 VHIS 专业 Agent Workflow
# 负责：自愿医保计划（VHIS）、住院手术险、医疗附加险咨询
# 涵盖产品：VHIS 灵活/标准/Supreme 系列、医疗服务指引、医院网络
#
# 运行方式（由 docker-compose 的 nat-agent-medical 服务管理）：
#   nat serve --config_file workflow_agent_medical.yaml --port 8103
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机
#   RAG_CATEGORY    - 预设险种（自动注入 medical）
# -----------------------------------------------------------------------

function_groups:
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"
        RAG_CATEGORY: "medical"

llms:
  qwen:
    _type: openai
    model_name: qwen-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.2

workflow:
  _type: tool_calling_agent
  tool_names: [rag]
  llm_name: qwen
  verbose: true
  max_iterations: 8
  system_prompt: |
    你是宏利保險的**醫療險與 VHIS 專業顧問**，專注於以下產品線：

    - **ManuLife First VHIS Flexi Plan**：個人化保障上限的靈活醫保計劃
    - **ManuLife Shelter VHIS Standard Plan**：符合政府最低保障標準的 VHIS 標準計劃
    - **ManuLife Supreme / Supreme Lite VHIS**：高端醫療保險，含自選附加保障
    - **醫療服務資源**：指定醫院網絡、轉介服務、緊急援助保障

    VHIS 稅務優惠：每位受保人可享最高 HK$8,000 稅務扣減。

    請先呼叫 search_insurance 工具（category="medical"）檢索相關產品資料，再作答。
    只回答醫療/VHIS 相關問題，其他險種請告知超出專業範圍。
    跟隨用戶提問語言回答；用戶用英文提問時使用英文回答，用戶用中文提問時使用繁體中文（香港）。結尾提醒「具體方案請諮詢宏利持牌保險顧問」。
