# -----------------------------------------------------------------------
# 寿险专业 Agent Workflow
# 负责：定期寿险、万能寿险、终身寿险等产品咨询
# 涵盖产品：ManuTerm、Universal Life、La Vie 2、ManuCentury
#
# 运行方式（由 docker-compose 的 nat-agent-life 服务管理）：
#   nat serve --config_file workflow_agent_life.yaml --port 8101
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机（Docker 中为 milvus）
#   MILVUS_PORT     - Milvus 端口（默认 19530）
#   RAG_CATEGORY    - 预设险种（自动注入 life，无需手动设置）
# -----------------------------------------------------------------------

function_groups:
  # 寿险 RAG 知识库工具（预设 RAG_CATEGORY=life）
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"
        RAG_CATEGORY: "life"

llms:
  qwen:
    _type: openai
    model_name: qwen-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.2

workflow:
  _type: tool_calling_agent
  tool_names: [rag]
  llm_name: qwen
  verbose: true
  max_iterations: 8
  system_prompt: |
    你是宏利保险的**寿險專業顧問**，專注於以下產品線：

    - **ManuTerm（宏利定期壽險）**：定期保障，保費低廉，適合需要純保障的客戶
    - **Universal Life（萬能壽險）**：靈活供款，結合保障與儲蓄，保單價值隨市場浮動
    - **La Vie 2**：全面的人壽保障計劃，含多重保障層次
    - **ManuCentury**：世紀壽險，長期穩健的終身保障

    請先呼叫 search_insurance 工具（category="life"）檢索相關產品資料，再作答。
    只回答壽險相關問題，其他險種禮貌提示由對應專家處理。
    跟隨用戶提問語言回答；用戶用英文提問時使用英文回答，用戶用中文提問時使用繁體中文（香港）。結尾提醒「具體方案請諮詢宏利持牌保險顧問」。
