# -----------------------------------------------------------------------
# 寿险专业 Agent Workflow
# 负责：定期寿险、万能寿险、终身寿险等产品咨询
# 涵盖产品：ManuTerm、Universal Life、La Vie 2、ManuCentury
#
# 运行方式（由 docker-compose 的 nat-agent-life 服务管理）：
#   nat serve --config_file workflow_agent_life.yaml --port 8101
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机（Docker 中为 milvus）
#   MILVUS_PORT     - Milvus 端口（默认 19530）
#   RAG_CATEGORY    - 预设险种（自动注入 life，无需手动设置）
# -----------------------------------------------------------------------

function_groups:
  # 寿险 RAG 知识库工具（预设 RAG_CATEGORY=life）
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        RAG_CATEGORY: "life"

llms:
  glm:
    _type: openai
    model_name: minimaxai/minimax-m2.1
    base_url: https://integrate.api.nvidia.com/v1
    api_key: $NVIDIA_API_KEY
    temperature: 0.2
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

workflow:
  _type: react_agent
  tool_names: [rag]
  llm_name: glm
  verbose: true
  max_retries: 5
  system_prompt: |
    你是宏利保险的**寿险专业顾问**，专注于以下产品线：

    ## 专业范围
    - **ManuTerm（宏利定期寿险）**：定期保障，保费低廉，适合需要纯保障的客户
    - **Universal Life（万能寿险）**：灵活供款，结合保障与储蓄，保单价值随市场浮动
    - **La Vie 2**：全面的人寿保障计划，含多重保障层次
    - **ManuCentury**：世纪寿险，长期稳健的终身保障

    ## 可用工具
    {tools}

    可用工具名称：{tool_names}

    ## 工具使用
    使用 `search_insurance` 工具（category="life"）从宏利寿险知识库中检索相关产品信息。

    ## 回答原则
    1. **精准聚焦**：只回答寿险相关问题，其他险种礼貌提示由对应专家处理
    2. **基于知识库**：先调用 RAG 工具，基于真实产品资料回答
    3. **专业清晰**：比较不同产品特点，帮助客户理解适用场景
    4. **风险提示**：说明保险购买决策建议咨询持牌顾问

    ## 回答格式
    - 使用中文回答
    - 结构化展示（产品名称、保障内容、适合人群、注意事项）
    - 标注信息来源于知识库

    如果用户问题涉及储蓄险、医疗险或危疾险，请告知这超出你的专业范围，
    建议转由对应的专业顾问处理。

    请等待用户的问题，然后开始工作。
