# -----------------------------------------------------------------------
# 仅启动 PostgreSQL，供本地 XHS 爬取使用
# 使用 15432 端口（Windows 上 5358-5557 常被保留，5432/5433 无法绑定）
#
# 用法：docker-compose -f docker-compose.xhs-local.yml up -d
# 或：  .\scripts\start-xhs-postgres.ps1
#
# 本地采集时设置：$env:POSTGRES_PORT = "15432"
# -----------------------------------------------------------------------

services:
  postgres:
    container_name: xhs-postgres-local
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: xhs_data
      POSTGRES_USER: xhs_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhs_secure_pass}
    volumes:
      - xhs_postgres_local:/var/lib/postgresql/data
      - ./xhs_db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs_user -d xhs_data"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  xhs_postgres_local:
    driver: local
