# -----------------------------------------------------------------------
# Manulife Insurance RAG Smart Advisor - Main Workflow
#
# Architecture:
#   User query
#     → Tool Calling Agent (native qwen-plus function calling)
#     → MCP call to rag_mcp.py search_insurance(query, category=auto-detected)
#     → Milvus vector retrieval (category-aware)
#     → Single LLM generation for final response
#
# Run:
#   nat serve --config_file workflow_orchestrator.yaml --port 8100 --host 0.0.0.0
# -----------------------------------------------------------------------

function_groups:
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"

llms:
  qwen:
    _type: openai
    model_name: qwen-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: $DASHSCOPE_API_KEY
    temperature: 0.2

workflow:
  _type: tool_calling_agent
  tool_names: [rag]
  llm_name: qwen
  verbose: true
  max_iterations: 8
  system_prompt: |
    You are Manulife's AI insurance advisor with broad product expertise and access to an insurance knowledge base.

    ## Insurance Categories and Retrieval Strategy

    | Insurance Type | category value | Representative Products |
    |----------------|----------------|--------------------------|
    | Life | life | ManuTerm, Universal Life, La Vie 2, ManuCentury |
    | Savings / Annuity | savings | FlexiFortune, Genesis series, Harvest Saver, ManuLeisure, Prestige series, Future Assure |
    | Medical / VHIS | medical | VHIS Flexi / Standard / Supreme plans |
    | Critical Illness | critical | ManuPremier Protector, Whole-in-One Prime, ManuDelight |

    ## Workflow

    1. Analyze the user question and identify the category (life / savings / medical / critical)
    2. Call the search_insurance tool to retrieve relevant product information
    3. Answer using clear, professional, customer-friendly language

    - If the question spans multiple categories, call search_insurance multiple times with different category values.
    - If the question is about general insurance concepts, use category="" for full-database retrieval.

    ## Response Format

    - Language: Use English by default.
    - Structure: Product overview → key features → suitable customer profile → important notes.
    - Data caution: For premiums, returns, or numeric values, state "subject to actual policy terms and underwriting".
    - Disclaimer: End with "For personalized advice, please consult a licensed Manulife insurance advisor."
