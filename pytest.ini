[pytest]
# pytest-asyncio 自动模式：所有 async def test_ 函数自动识别为异步测试
asyncio_mode = auto

# 显示最慢的 10 个测试
addopts = --tb=short -q

# 测试文件搜索路径
testpaths = .

# 自定义标记（避免 PytestUnknownMarkWarning）
markers =
    requires_api: 需要真实 NVIDIA_API_KEY 的测试
    unit: 纯单元测试（无外部服务依赖）
    integration: 集成测试（需要 Milvus + PostgreSQL）
    e2e: 端到端测试（需要全部服务 + NVIDIA API Key）
