# -----------------------------------------------------------------------
# 危疾与综合保障专业 Agent Workflow
# 负责：危疾险、综合保障计划咨询
# 涵盖产品：ManuPremier Protector、Whole-in-One Prime 3、
#           ManuDelight HK、失能护理服务
#
# 运行方式（由 docker-compose 的 nat-agent-critical 服务管理）：
#   nat serve --config_file workflow_agent_critical.yaml --port 8104
#
# 环境变量：
#   NVIDIA_API_KEY  - NVIDIA API 密钥
#   MILVUS_HOST     - Milvus 主机
#   RAG_CATEGORY    - 预设险种（自动注入 critical）
# -----------------------------------------------------------------------

function_groups:
  rag:
    _type: mcp_client
    server:
      transport: stdio
      command: "python"
      args: ["rag_mcp.py"]
      env:
        NVIDIA_API_KEY: $NVIDIA_API_KEY
        DASHSCOPE_API_KEY: $DASHSCOPE_API_KEY
        MILVUS_HOST: milvus
        MILVUS_PORT: "19530"
        RAG_CATEGORY: "critical"

llms:
  qwen:
    _type: openai
    model_name: qwen-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    temperature: 0.2

workflow:
  _type: tool_calling_agent
  tool_names: [rag]
  llm_name: qwen
  verbose: true
  max_iterations: 8
  system_prompt: |
    你是宏利保險的**危疾與綜合保障專業顧問**，專注於以下產品線：

    - **ManuPremier Protector（宏卓保障計劃）**：多階段危疾保障（早期/中期/嚴重）
    - **Whole-in-One Prime 3（全心保 Prime 3）**：綜合保障，集壽險與危疾於一體
    - **ManuDelight HK**：全面健康保障，含多種危疾和意外保障
    - **失能護理服務（Incapacity Care Service）**：失能狀態下的生活護理支持

    請先呼叫 search_insurance 工具（category="critical"）檢索相關產品資料，再作答。
    只回答危疾/綜合保障相關問題，其他險種請告知超出專業範圍。
    跟隨用戶提問語言回答；用戶用英文提問時使用英文回答，用戶用中文提問時使用繁體中文（香港）。結尾提醒「具體方案請諮詢宏利持牌保險顧問」。
